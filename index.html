<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voyage Architect</title>
  <style>
    :root {
      --bg1: #06121f;
      --bg2: #0f172a;
      --bg3: #1e293b;
      --glass: rgba(255,255,255,0.10);
      --glass-2: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.14);
      --text: rgba(255,255,255,0.95);
      --muted: rgba(255,255,255,0.68);
      --soft: rgba(255,255,255,0.52);
      --dark: #0f172a;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(56,189,248,0.16), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(167,139,250,0.18), transparent 25%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1600&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      opacity: 0.14;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--soft);
      font-size: 14px;
      margin-top: 4px;
    }

    .shell, .card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.22);
      backdrop-filter: blur(14px);
    }

    .shell { padding: 24px; }
    .card { padding: 20px; }

    .section-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      color: rgba(255,255,255,0.92);
      margin-bottom: 12px;
    }

    h1, h2, h3, p { margin-top: 0; }
    h1 {
      font-size: clamp(30px, 4vw, 40px);
      line-height: 1.05;
      margin-bottom: 10px;
      letter-spacing: -0.03em;
    }
    h2 { font-size: 22px; margin-bottom: 10px; }
    h3 { font-size: 16px; margin-bottom: 8px; }
    p { color: var(--muted); line-height: 1.65; }

    .grid-4, .grid-3, .grid-days, .grid-slots {
      display: grid;
      gap: 16px;
    }
    .grid-4 { grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); }
    .grid-3 { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    .grid-days { grid-template-columns: 1fr; }
    .grid-slots { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 8px 14px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.10);
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.92);
    }

    .btn, .pill, .chip, .activity-btn {
      border-radius: 18px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
      transition: 160ms ease;
      font: inherit;
    }

    .btn:hover, .pill:hover, .chip:hover, .activity-btn:hover { transform: translateY(-1px); }
    .btn.primary {
      background: white;
      color: var(--dark);
      border-color: transparent;
      font-weight: 700;
    }
    .btn.ghost {
      background: rgba(255,255,255,0.08);
      color: white;
    }
    .btn.small { padding: 8px 12px; border-radius: 14px; font-size: 14px; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
      justify-content: space-between;
      align-items: center;
    }

    .left-actions, .right-actions, .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--soft);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .progress-track {
      height: 10px;
      background: rgba(255,255,255,0.10);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 22px;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: white;
      transition: width 220ms ease;
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .option-card, .activity-btn {
      text-align: left;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 16px;
    }

    .selected {
      background: rgba(255,255,255,0.18) !important;
      border-color: rgba(255,255,255,0.42) !important;
    }

    .slider-wrap { margin-top: 14px; }
    input[type="range"] { width: 100%; }

    input[type="text"], textarea {
      width: 100%;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: white;
      padding: 14px 16px;
      font: inherit;
      outline: none;
    }

    textarea { min-height: 220px; resize: vertical; }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.38); }

    .count-card { text-align: center; }
    .count-value {
      font-size: 42px;
      font-weight: 800;
      line-height: 1;
      margin: 12px 0;
    }

    .muted { color: var(--muted); }
    .soft { color: var(--soft); }
    .hidden { display: none !important; }

    .planner-wrap {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 18px;
    }

    .library {
      max-height: 72vh;
      overflow: auto;
    }

    .library-item, .planner-item, .slot {
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
    }

    .library-item {
      padding: 14px;
      margin-bottom: 10px;
    }

    .library-item .meta, .planner-item .meta, .slot .empty {
      color: var(--soft);
      font-size: 13px;
      margin-top: 5px;
    }

    .slot {
      padding: 14px;
      background: rgba(255,255,255,0.05);
      border-style: dashed;
      min-height: 150px;
    }

    .slot-title {
      font-weight: 700;
      margin-bottom: 10px;
    }

    .planner-item {
      padding: 12px;
      margin-top: 10px;
    }

    .planner-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }

    .icon-btn {
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
      padding: 2px 4px;
      font-size: 16px;
    }

    .mini-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 10px;
    }

    .link {
      display: inline-block;
      margin-top: 10px;
      color: #dbeafe;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .summary-box {
      border-radius: 22px;
      padding: 18px;
      background: rgba(0,0,0,0.12);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .packing-list {
      display: grid;
      gap: 8px;
      max-height: 300px;
      overflow: auto;
    }

    .packing-row {
      display: flex;
      gap: 10px;
      align-items: center;
      color: rgba(255,255,255,0.84);
      font-size: 14px;
    }

    .packing-cat {
      margin-left: auto;
      color: rgba(255,255,255,0.45);
      font-size: 12px;
    }

    @media (max-width: 980px) {
      .planner-wrap { grid-template-columns: 1fr; }
      .library { max-height: none; }
    }
  </style>
</head>

      return `${h}h ${m}m`;
    }

    function getDayLoadLabel(minutes) {
      if (minutes < 180) return { label: "Light day", hint: "Still roomy" };
      if (minutes < 360) return { label: "Balanced day", hint: "Looks comfortable" };
      if (minutes < 480) return { label: "Busy day", hint: "Getting packed" };
      return { label: "Very full day", hint: "Maybe trim a few things" };
    }

    function buildPackingList(destination, activities, days) {
      const base = [
        { id: "p-1", label: "Passport / ID", packed: false, category: "Essentials" },
        { id: "p-2", label: "Phone charger", packed: false, category: "Essentials" },
        { id: "p-3", label: "Travel wallet", packed: false, category: "Essentials" },
        { id: "p-4", label: "Toothbrush", packed: false, category: "Toiletries" },
        { id: "p-5", label: "Socks", packed: false, category: "Clothing" },
        { id: "p-6", label: "T-shirts", packed: false, category: "Clothing" },
        { id: "p-7", label: `${Math.max(2, Math.ceil(days / 2))} outfits`, packed: false, category: "Clothing" },
        { id: "p-8", label: "Comfortable shoes", packed: false, category: "Clothing" },
      ];
      const extras = [];
      if (["Japan", "United Kingdom", "UK", "France", "Canada", "New Zealand", "China", "USA"].includes(destination)) {
        extras.push({ id: "p-9", label: "Light jacket", packed: false, category: "Clothing" });
      }
      if (["Thailand", "Australia", "Italy", "France", "USA"].includes(destination)) {
        extras.push({ id: "p-10", label: "Sun cream", packed: false, category: "Toiletries" });
        extras.push({ id: "p-11", label: "Hat / cap", packed: false, category: "Clothing" });
      }
      if (activities.includes("watersports")) {
        extras.push({ id: "p-12", label: "Swimwear", packed: false, category: "Activities" });
        extras.push({ id: "p-13", label: "Quick dry towel", packed: false, category: "Activities" });
      }
      if (activities.includes("hiking") || activities.includes("nature")) {
        extras.push({ id: "p-14", label: "Day backpack", packed: false, category: "Activities" });
        extras.push({ id: "p-15", label: "Water bottle", packed: false, category: "Activities" });
      }
      if (activities.includes("museums") || activities.includes("culture")) {
        extras.push({ id: "p-16", label: "Small notebook", packed: false, category: "Activities" });
      }
      return [...base, ...extras];
    }

    function selectedDestination() {
      return state.formData.destination === "Custom"
        ? (state.formData.customDestination || "Custom destination")
        : state.formData.destination;
    }

    function selectedActivityLabels() {
      return state.formData.activities.map(getActivityLabel).join(", ");
    }

    function summaryText() {
      let pace = "balanced";
      if (state.formData.intensity <= 35) pace = "quite relaxed";
      if (state.formData.intensity >= 75) pace = "fast paced";
      const totalTravelers = state.formData.adults + state.formData.children + state.formData.teenagers;
      return `A ${state.formData.days} day trip to ${selectedDestination()} for ${totalTravelers} traveler${totalTravelers === 1 ? "" : "s"} with a budget of about $${state.formData.budget}. The plan leans ${state.formData.vibe}, includes ${selectedActivityLabels() || "a mix of activities"}, and has a ${pace} daily pace.`;
    }

    function smartLibrary() {
      const budgetBand = state.formData.budget < 1600 ? "low" : state.formData.budget < 5000 ? "mid" : "high";
      const intensityBand = state.formData.intensity < 40 ? "low" : state.formData.intensity < 75 ? "mid" : "high";
      const familyWeight = state.formData.children + state.formData.teenagers > 0;
      return librarySeed.filter(card => {
        const destinationOk = !card.destinations || card.destinations.includes(selectedDestination());
        if (!destinationOk) return false;
        if (budgetBand === "low" && card.cost === "high") return false;
        if (intensityBand === "low" && card.intensity === "high") return false;
        if (state.formData.vibe === "religious" && card.tags.includes("adventure") && !card.tags.includes("nature")) return false;
        if (state.formData.vibe === "activity" && card.tags.includes("religious") && !card.tags.includes("history")) return false;
        if (familyWeight && (card.familyScore ?? 0) < 6) return false;
        return true;
      });
    }

    function finalLibrary() {
      const q = state.librarySearch.trim().toLowerCase();
      if (!q) return smartLibrary();
      return smartLibrary().filter(card => {
        const haystack = `${card.title} ${card.tags.join(" ")} ${card.slot}`.toLowerCase();
        return haystack.includes(q);
      });
    }

    function canContinue() {
      const current = questionOrder[state.step];
      if (current === "destination") {
        if (state.formData.destination === "Custom") return state.formData.customDestination.trim().length > 1;
        return Boolean(state.formData.destination);
      }
      if (current === "activities") return state.formData.activities.length > 0;
      return true;
    }

    function nextStep() {
      state.step = Math.min(state.step + 1, questionOrder.length - 1);
      render();
    }

    function prevStep() {
      state.step = Math.max(state.step - 1, 0);
      render();
    }

    function resetAll() {
      state.mode = "survey";
      state.step = 0;
      state.formData = structuredClone(initialData);
      state.plannerDays = Array.from({ length: initialData.days }, () => createEmptyDayPlan());
      state.librarySearch = "";
      state.packingList = buildPackingList(initialData.destination, initialData.activities, initialData.days);
      render();
    }

    function goToPlanner() {
      state.mode = "planner";
      state.plannerDays = Array.from({ length: state.formData.days }, () => createEmptyDayPlan());
      state.packingList = buildPackingList(selectedDestination(), state.formData.activities, state.formData.days);
      render();
    }

    function goToDashboard() {
      state.mode = "dashboard";
      render();
    }

    function addDay() {
      state.plannerDays.push(createEmptyDayPlan());
      state.formData.days += 1;
      render();
    }

    function removeDay() {
      if (state.plannerDays.length > 1) {
        state.plannerDays.pop();
        state.formData.days = Math.max(1, state.formData.days - 1);
        render();
      }
    }

    function updateGroupCount(field, delta) {
      state.formData[field] = clampCount(state.formData[field] + delta);
      render();
    }

    function toggleActivity(id) {
      if (state.formData.activities.includes(id)) {
        state.formData.activities = state.formData.activities.filter(item => item !== id);
      } else {
        state.formData.activities.push(id);
      }
      render();
    }

    function addCardToSlot(dayIndex, card) {
      const plannerCard = {
        id: `${card.id}-${dayIndex}-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
        title: card.title,
        slot: card.slot,
        duration: card.duration,
        tags: [...card.tags],
      };
      state.plannerDays[dayIndex][card.slot].push(plannerCard);
      render();
    }

    function deleteCard(dayIndex, slot, cardId) {
      state.plannerDays[dayIndex][slot] = state.plannerDays[dayIndex][slot].filter(item => item.id !== cardId);
      render();
    }

    function updateCardDuration(dayIndex, slot, cardId, change) {
      state.plannerDays[dayIndex][slot] = state.plannerDays[dayIndex][slot].map(item =>
        item.id === cardId ? { ...item, duration: Math.max(5, item.duration + change) } : item
      );
      render();
    }

    function autoBuildDay(dayIndex) {
      const newDay = createEmptyDayPlan();
      plannerSlots.forEach(({ key }) => {
        const match = finalLibrary().find(card => card.slot === key);
        if (match) {
          newDay[key].push({
            id: `${match.id}-${dayIndex}-${Date.now()}-${key}`,
            title: match.title,
            slot: match.slot,
            duration: match.duration,
            tags: [...match.tags],
          });
        }
      });
      state.plannerDays[dayIndex] = newDay;
      render();
    }

    function togglePacked(id) {
      state.packingList = state.packingList.map(item => item.id === id ? { ...item, packed: !item.packed } : item);
      render();
    }

    function getRecommendations(card) {
      const destination = selectedDestination();
      const lower = card.title.toLowerCase();
      if (lower.includes("breakfast") || lower.includes("cafe") || lower.includes("bakery")) {
        return [`Best breakfast cafes in ${destination}`, `${destination} brunch spots`, `Top local bakery breakfast in ${destination}`];
      }
      if (lower.includes("museum") || lower.includes("gallery") || lower.includes("history")) {
        return [`Top museums in ${destination}`, `Family friendly museums in ${destination}`, `Historic sites in ${destination}`];
      }
      if (lower.includes("food") || lower.includes("dinner") || lower.includes("ramen") || lower.includes("dessert")) {
        return [`Best food spots in ${destination}`, `Popular restaurants in ${destination}`, `Street food in ${destination}`];
      }
      if (lower.includes("nature") || lower.includes("walk") || lower.includes("viewpoint") || lower.includes("beach")) {
        return [`Best nature spots in ${destination}`, `Scenic walks in ${destination}`, `Beautiful viewpoints in ${destination}`];
      }
      if (lower.includes("train") || lower.includes("drive") || lower.includes("ferry") || lower.includes("boat")) {
        return [`Best travel routes in ${destination}`, `How to get around ${destination}`, `Transport highlights in ${destination}`];
      }
      return [`Things to do in ${destination}`, `Top attractions in ${destination}`, `Family activities in ${destination}`];
    }

    function renderSurveyStep() {
      const current = questionOrder[state.step];
      const content = document.getElementById("surveyContent");
      if (!content) return;
      const totalTravelers = state.formData.adults + state.formData.children + state.formData.teenagers;

          </div>
          ${state.formData.destination === "Custom" ? `<div style="margin-top:16px"><input id="customDestinationInput" type="text" placeholder="Type your destination" value="${escapeHtml(state.formData.customDestination)}"></div>` : ""}
        `;

      if (current === "group") {

            ${["adults","children","teenagers"].map(field => `

                </div>
              </div>
            `).join("")}
          </div>
        `;
        content.querySelectorAll("[data-dec]").forEach(btn => btn.addEventListener("click", () => updateGroupCount(btn.dataset.dec, -1)));
        content.querySelectorAll("[data-inc]").forEach(btn => btn.addEventListener("click", () => updateGroupCount(btn.dataset.inc, 1)));
        return;
      }

      if (current === "activities") {
        content.innerHTML = `
          <div class="section-kicker">Holiday Planner</div>

          <p>Pick all the travel ingredients you want in the mix.</p>

              <div>

                <div class="grid-4">
                  ${group.items.map(activity => `
                    <button class="activity-btn ${state.formData.activities.includes(activity.id) ? "selected" : ""}" data-activity="${activity.id}">${activity.label}</button>

            `).join("")}
          </div>
        `;
        content.querySelectorAll("[data-activity]").forEach(btn => btn.addEventListener("click", () => toggleActivity(btn.dataset.activity)));
        return;
      }

      if (current === "vibe") {
        content.innerHTML = `

              </button>
            `).join("")}
          </div>
        `;
        content.querySelectorAll("[data-vibe]").forEach(btn => btn.addEventListener("click", () => {

          render();

          render();

        content.innerHTML = `
          <div class="section-kicker">Holiday Planner</div>
          <h1>Any extra notes or must haves?</h1>
          <p>This can later feed into highlights, packing lists, and ideas.</p>
          <textarea id="notesInput" placeholder="Tell me any extra ideas for the trip...">${escapeHtml(state.formData.notes)}</textarea>
        `;
        document.getElementById("notesInput").addEventListener("input", e => {
          state.formData.notes = e.target.value;
        });
        return;
      }

      content.innerHTML = `
        <div class="section-kicker">Holiday Planner</div>
        <h1>Your holiday survey summary</h1>

    function renderPlanner() {

                  </div>

            }).join("")}

      plannerView.querySelectorAll("[data-add-card]").forEach(btn => btn.addEventListener("click", () => {
        const card = librarySeed.find(item => item.id === btn.dataset.addCard);

      plannerView.querySelectorAll("[data-auto-day]").forEach(btn => btn.addEventListener("click", () => autoBuildDay(Number(btn.dataset.autoDay))));

      plannerView.querySelectorAll("[data-add-random]").forEach(btn => btn.addEventListener("click", () => {

      plannerView.querySelectorAll("[data-minus]").forEach(btn => btn.addEventListener("click", () => {
        const [dayIndex, slot, cardId] = btn.dataset.minus.split("|");

      plannerView.querySelectorAll("[data-plus]").forEach(btn => btn.addEventListener("click", () => {
        const [dayIndex, slot, cardId] = btn.dataset.plus.split("|");

    function renderDashboard() {
      const dashboardView = document.getElementById("dashboardView");

      const totalMinutes = allPlannedCards.reduce((sum, item) => sum + item.duration, 0);

      const totalTravelers = state.formData.adults + state.formData.children + state.formData.teenagers;

      const stays = Math.round(state.formData.days * (90 + totalTravelers * 18));

        if (card.tags.includes("museum") || card.tags.includes("history")) return sum + 18;
        if (card.tags.includes("food")) return sum + 12;
        return sum + 10;
      }, 0));
      const extras = Math.round(state.formData.budget * 0.1);
      const total = stays + food + transport + activities + extras;

      dashboardView.innerHTML = `
        <div class="section-kicker">Section 3 Dashboard</div>
        <h1>Trip Dashboard</h1>
        <p>Summary, costs, packing list, highlights, and recommendations.</p>

        <div class="toolbar" style="margin-bottom:18px">
          <button id="backToPlannerBtn" class="btn ghost">Back to Planner</button>
          <button id="resetDashBtn" class="btn ghost">Reset</button>
        </div>

        <div class="grid-4" style="margin-bottom:18px">
          <div class="card"><div class="soft">Destination</div><div style="font-size:28px;font-weight:800;margin-top:8px">${selectedDestination()}</div></div>
          <div class="card"><div class="soft">Trip Length</div><div style="font-size:28px;font-weight:800;margin-top:8px">${state.plannerDays.length} days</div></div>
          <div class="card"><div class="soft">Planned Activities</div><div style="font-size:28px;font-weight:800;margin-top:8px">${allPlannedCards.length}</div></div>
          <div class="card"><div class="soft">Total Planned Time</div><div style="font-size:28px;font-weight:800;margin-top:8px">${formatMinutes(totalMinutes)}</div></div>
        </div>

        <div class="grid-3" style="margin-bottom:18px">
          <div class="card" style="grid-column: span 2;">
            <h2>Trip Summary</h2>
            <p>${summaryText()}</p>
            <div class="toolbar" style="margin-top:14px">${topTags.map(tag => `<div class="badge">${tag}</div>`).join("")}</div>
          </div>
          <div class="card">
            <h2>Highlights</h2>
            <ul>
              ${(uniqueHighlights.length ? uniqueHighlights : ["Build a few planner days to generate highlights."]).map(item => `<li>${item}</li>`).join("")}
            </ul>
          </div>
        </div>

        <div class="grid-3">
          <div class="card">
            <h2>Cost Estimate</h2>
            <div class="muted">Stays: $${stays}</div>
            <div class="muted">Food: $${food}</div>
            <div class="muted">Transport: $${transport}</div>
            <div class="muted">Activities: $${activities}</div>
            <div class="muted">Extras: $${extras}</div>
            <div style="margin-top:10px;font-size:22px;font-weight:800">Estimated total: $${total}</div>
          </div>

          <div class="card">
            <h2>Packing List</h2>
            <div class="muted" style="margin-bottom:10px">${packedCount} / ${state.packingList.length} packed</div>
            <div class="packing-list">
              ${state.packingList.map(item => `
                <label class="packing-row">
                  <input type="checkbox" data-pack-id="${item.id}" ${item.packed ? "checked" : ""}>
                  <span>${item.label}</span>
                  <span class="packing-cat">${item.category}</span>
                </label>
              `).join("")}
            </div>
          </div>

          <div class="card">
            <h2>Recommendations</h2>
            <div style="display:grid;gap:10px">
              <a class="link" href="${recommendationLink(`Best family activities in ${selectedDestination()}`)}" target="_blank" rel="noreferrer">Best family activities in ${selectedDestination()}</a>
              <a class="link" href="${recommendationLink(`Best food in ${selectedDestination()}`)}" target="_blank" rel="noreferrer">Best food in ${selectedDestination()}</a>
              <a class="link" href="${recommendationLink(`Packing tips for ${selectedDestination()}`)}" target="_blank" rel="noreferrer">Packing tips for ${selectedDestination()}</a>
              <a class="link" href="${recommendationLink(`Transport guide for ${selectedDestination()}`)}" target="_blank" rel="noreferrer">Transport guide for ${selectedDestination()}</a>
            </div>
          </div>
        </div>
      `;

      document.getElementById("backToPlannerBtn").addEventListener("click", () => { state.mode = "planner"; render(); });
      document.getElementById("resetDashBtn").addEventListener("click", resetAll);
      dashboardView.querySelectorAll("[data-pack-id]").forEach(box => box.addEventListener("change", () => togglePacked(box.dataset.packId)));
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function render() {
      const surveyView = document.getElementById("surveyView");
      const plannerView = document.getElementById("plannerView");
      const dashboardView = document.getElementById("dashboardView");
      surveyView.classList.toggle("hidden", state.mode !== "survey");
      plannerView.classList.toggle("hidden", state.mode !== "planner");
      dashboardView.classList.toggle("hidden", state.mode !== "dashboard");

      const progress = ((state.step + 1) / questionOrder.length) * 100;
      document.getElementById("progressText").textContent = `Step ${state.step + 1} of ${questionOrder.length}`;
      document.getElementById("progressPct").textContent = `${Math.round(progress)}%`;
      document.getElementById("progressBar").style.width = `${progress}%`;

      renderSurveyStep();
      if (state.mode === "planner") renderPlanner();
      if (state.mode === "dashboard") renderDashboard();

      const backBtn = document.getElementById("backBtn");
      const nextBtn = document.getElementById("nextBtn");
      backBtn.disabled = state.step === 0;
      nextBtn.disabled = !canContinue();
      nextBtn.textContent = state.step < questionOrder.length - 1 ? "Next" : "Build My Trip";
    }

    document.getElementById("backBtn").addEventListener("click", prevStep);
    document.getElementById("nextBtn").addEventListener("click", () => {
      if (state.step < questionOrder.length - 1) nextStep();
      else goToPlanner();
    });
    document.getElementById("resetTopBtn").addEventListener("click", resetAll);

    render();
  </script>
</body>
</html>
